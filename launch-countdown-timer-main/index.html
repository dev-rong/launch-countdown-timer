<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@300;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Launch countdown timer</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
  
  </style>
</head>

<body>
  <header>
    <h1>WE'RE LAUNCHING SOON</h1>
  </header> 
  
  <main>
    <div class="timer-wrapper">
      <h2 id="days" class="timer"></h2>
      <h3>DAYS</h3>
    </div>
    <div class="timer-wrapper">
      <h2 id="hours" class="timer"></h2>
      <h3>HOURS</h3>
    </div>
    <div class="timer-wrapper">
      <h2 id="minutes" class="timer"></h2>
      <h3>MINUTES</h3>
    </div>
    <div class="timer-wrapper">
      <h2 id="seconds" class="timer"></h2>
      <h3>SECONDS</h3>
    </div>
  </main>
  
  <footer>
    <div class="footer-wrapper">
      <img class="footer-image" src="./images/pattern-hills.svg" alt="slides">
      <div class="attribution">
        Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
        Coded by <a href="#">Cho-rong Lee</a>.
      </div>
    </div>
  </footer>
  
  
</body>
</html>
