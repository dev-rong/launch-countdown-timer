<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@300;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Launch countdown timer</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
     @media screen and (min-width: 375px) {
      body{
          font-family:'Red Hat Text', sans-serif; 
          font-size:1rem; 
          font-weight:700;
          background-color:hsl(235, 16%, 14%);
          background-image:url("./images/bg-stars.svg")
      } 
      h1{text-align:center; color:hsl(0, 0%, 100%)}
      h2{width:100px; height:100px; border-radius:10px; background:hsl(236, 21%, 26%);}
      main{display:flex; justify-content:space-evenly; align-items:center;} 
      h3{text-align:center; color:hsl(237, 18%, 59%)}
      footer{position:fixed; bottom:0; width:100%;}
      .footer-wrapper{position:relative; z-index:1;}
      .footer-image{position:absolute; z-index:2; bottom:0; width:100vw;}
      .attribution {position:absolute; z-index:3; left:30px; bottom:30px; color:hsl(237, 18%, 59%); font-size:11px; text-align:center; }
      .attribution a {color:white }
  }
  </style>
</head>

<body>
  <header>
    <h1>WE'RE LAUNCHING SOON</h1>
  </header> 
  
  <main>
    <div class="timer-wrapper">
      <h2 id="days" class="timer"></h2>
      <h3>DAYS</h3>
    </div>
    <div class="timer-wrapper">
      <h2 id="hours" class="timer"></h2>
      <h3>HOURS</h3>
    </div>
    <div class="timer-wrapper">
      <h2 id="minutes" class="timer"></h2>
      <h3>MINUTES</h3>
    </div>
    <div class="timer-wrapper">
      <h2 id="seconds" class="timer"></h2>
      <h3>SECONDS</h3>
    </div>
  </main>
  
  <footer>
    <div class="footer-wrapper">
      <img class="footer-image" src="./images/pattern-hills.svg" alt="slides">
      <div class="footer-icon">
        <img src="./images/icon-facebook.svg" alt="">
        <img src="./images/icon-pinterest.svg" alt="">
        <img src="./images/icon-instagram.svg" alt="">
      </div>
      <div class="attribution">
        Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
        Coded by <a href="#">Cho-rong Lee</a>.
      </div>
    </div>
  </footer>
  
  
</body>
</html>
